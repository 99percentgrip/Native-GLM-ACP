name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            binary: native-glm-acp
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            binary: native-glm-acp
            archive: tar.gz
          - os: macos-15-intel
            target: darwin-x86_64
            binary: native-glm-acp
            archive: tar.gz
          - os: macos-15
            target: darwin-aarch64
            binary: native-glm-acp
            archive: tar.gz
          - os: windows-latest
            target: windows-x86_64
            binary: native-glm-acp.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Install locked dependencies
        run: uv sync --frozen --extra dev
      - name: Verify tag matches package version
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(uv run --frozen python -c 'from glm_acp import __version__; print(__version__)')"
      - name: Run tests
        run: uv run --frozen pytest tests/ -q
      - name: Build frozen executable
        run: uv run --frozen pyinstaller --noconfirm --clean --onefile --name native-glm-acp --collect-all acp glm_acp/launcher.py
      - name: Verify frozen executable
        shell: bash
        run: test "$("dist/${{ matrix.binary }}" --version)" = "${GITHUB_REF_NAME#v}"
      - name: Enforce frozen executable size ceiling
        run: python -c "from pathlib import Path; size=Path('dist/${{ matrix.binary }}').stat().st_size; print(f'{size} bytes'); assert size < 31 * 1024 * 1024"
      - name: Package Unix executable
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -C dist -czf native-glm-acp-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
      - name: Package Windows executable
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath native-glm-acp-${{ matrix.target }}.zip
      - name: Write SHA-256 checksum
        shell: bash
        run: |
          asset="native-glm-acp-${{ matrix.target }}.${{ matrix.archive }}"
          if command -v sha256sum >/dev/null; then sha256sum "$asset" > "$asset.sha256"; else shasum -a 256 "$asset" > "$asset.sha256"; fi
      - name: Attest release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: native-glm-acp-${{ matrix.target }}.${{ matrix.archive }}
      - name: Upload release asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: |
            native-glm-acp-${{ matrix.target }}.${{ matrix.archive }}
            native-glm-acp-${{ matrix.target }}.${{ matrix.archive }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build Python distributions
        run: uv build
      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*'
          merge-multiple: true
      - name: Generate ACP Registry manifest
        env:
          VERSION: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          version="${VERSION#v}"
          base="https://github.com/${REPOSITORY}/releases/download/${VERSION}"
          jq -n --arg version "$version" --arg repository "https://github.com/${REPOSITORY}" --arg base "$base" '{
            id: "native-glm-acp",
            name: "Native GLM ACP",
            version: $version,
            description: "Native GLM ACP with 1M context, semantic LSP navigation, transactional multi-file patches, cache-aware prompts, redacted telemetry, and no Python runtime.",
            repository: $repository,
            website: $repository,
            authors: ["Aleksejs Kozlitins"],
            license: "Apache-2.0",
            distribution: {binary: {
              "darwin-x86_64": {archive: ($base + "/native-glm-acp-darwin-x86_64.tar.gz"), cmd: "./native-glm-acp"},
              "darwin-aarch64": {archive: ($base + "/native-glm-acp-darwin-aarch64.tar.gz"), cmd: "./native-glm-acp"},
              "linux-x86_64": {archive: ($base + "/native-glm-acp-linux-x86_64.tar.gz"), cmd: "./native-glm-acp"},
              "linux-aarch64": {archive: ($base + "/native-glm-acp-linux-aarch64.tar.gz"), cmd: "./native-glm-acp"},
              "windows-x86_64": {archive: ($base + "/native-glm-acp-windows-x86_64.zip"), cmd: "./native-glm-acp.exe"}
            }}
          }' > agent.json
          cp registry/icon.svg icon.svg
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes agent.json icon.svg scripts/install.sh scripts/install.ps1 native-glm-acp-* dist/*
