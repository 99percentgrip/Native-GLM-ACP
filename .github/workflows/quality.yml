name: Quality benchmark

on:
  workflow_dispatch:
    inputs:
      repeat:
        description: Runs per benchmark case
        required: true
        default: "1"
        type: choice
        options: ["1", "3", "5"]

permissions:
  contents: read

jobs:
  native-glm:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      GLM_ACP_SESSION_PERSISTENCE: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Require opt-in benchmark credential
        shell: bash
        run: test -n "$ZAI_API_KEY"
      - name: Install locked dependencies
        run: uv sync --frozen --extra dev
      - name: Run isolated outcome benchmarks
        run: >-
          uv run --frozen python benchmarks/eval.py
          --label native-glm-acp
          --repeat "${{ inputs.repeat }}"
          --output quality/native-glm-acp.json
      - name: Build Markdown quality report
        run: >-
          uv run --frozen python benchmarks/report.py
          quality/native-glm-acp.json
          --output quality/report.md
      - name: Publish job summary
        shell: bash
        run: cat quality/report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload reproducible quality report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-glm-acp-quality
          path: quality/
          if-no-files-found: error
